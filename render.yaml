services:
  # Backend Web Service
  - type: web
    name: fair-resume-backend
    env: node
    plan: free
    region: ohio
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false

  # Frontend Static Site
  - type: static
    name: fair-resume-frontend
    env: static
    plan: free
    region: ohio
    buildCommand: cd frontend && npm install && CI=false npm run build
    staticPublishPath: frontend/build
    routes:
      - type: rewrite
        src: /*
        dest: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: REACT_APP_GOOGLE_CLIENT_ID
        sync: false
